<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trocar Senha — PatrimônioTech</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --p900:#3d1236; --p800:#5a1f4f; --p700:#7b2d6e; --p600:#9b3d8e;
    --p400:#c060b0; --p200:#e8b8de; --p100:#f7edf5;
    --pink:#d94f8a; --white:#ffffff;
    --text:#1a0a18; --text-soft:#6b4a66; --border:#e8d8e5;
    --success:#16a34a; --success-bg:#f0fdf4; --success-border:#bbf7d0;
    --danger:#dc2626; --danger-bg:#fef2f2; --danger-border:#fecaca;
  }
  html, body { height:100%; font-family:"Nunito",sans-serif; background:var(--p100); color:var(--text); }
  body { display:flex; align-items:center; justify-content:center; padding:20px; min-height:100vh; }

  .wrap { width:100%; max-width:420px; animation:fadeUp .5s cubic-bezier(.16,1,.3,1) both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  .card {
    background:var(--white); border-radius:20px; padding:36px 32px;
    box-shadow:0 8px 40px rgba(61,18,54,.15);
  }

  .card-icon {
    width:56px; height:56px; border-radius:16px; margin:0 auto 20px;
    background:linear-gradient(135deg,var(--pink),var(--p700));
    display:flex; align-items:center; justify-content:center; font-size:26px;
  }

  .eyebrow {
    text-align:center; font-size:11px; font-weight:800; letter-spacing:1.5px;
    text-transform:uppercase; color:var(--p600); margin-bottom:8px;
  }
  .eyebrow::before, .eyebrow::after {
    content:"——"; color:var(--p200); margin:0 8px;
  }

  h1 {
    font-family:"DM Serif Display",serif; font-size:26px; font-weight:400;
    text-align:center; color:var(--text); margin-bottom:8px;
  }
  .sub {
    text-align:center; font-size:13px; color:var(--text-soft); font-weight:600;
    margin-bottom:28px; line-height:1.6;
  }

  .aviso {
    background:rgba(217,79,138,.08); border:1px solid rgba(217,79,138,.25);
    border-radius:12px; padding:12px 16px; margin-bottom:22px;
    font-size:13px; font-weight:600; color:var(--p700);
    display:flex; align-items:flex-start; gap:10px;
  }
  .aviso svg { width:16px; height:16px; flex-shrink:0; margin-top:1px; stroke:var(--pink); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

  .field { margin-bottom:18px; }
  .field label { display:block; font-size:11px; font-weight:800; color:var(--text-soft); text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px; }

  .input-wrap { position:relative; }
  .input-wrap svg.ico { position:absolute; left:14px; top:50%; transform:translateY(-50%); width:16px; height:16px; stroke:var(--p400); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; pointer-events:none; }
  .input-wrap input {
    width:100%; padding:13px 42px 13px 42px;
    border:1.5px solid var(--border); border-radius:12px;
    font-family:"Nunito",sans-serif; font-size:14px; font-weight:600; color:var(--text);
    background:var(--p100); outline:none; transition:all .2s;
  }
  .input-wrap input:focus { border-color:var(--p600); background:var(--white); box-shadow:0 0 0 4px rgba(155,61,142,.1); }
  .toggle-pw { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--p400); cursor:pointer; font-size:16px; padding:4px; }
  .toggle-pw:hover { color:var(--p700); }

  /* Indicador de força */
  .strength-bar { display:flex; gap:4px; margin-top:8px; }
  .strength-bar div { height:4px; flex:1; border-radius:4px; background:var(--border); transition:background .3s; }
  .strength-bar div.on-1 { background:#dc2626; }
  .strength-bar div.on-2 { background:#d97706; }
  .strength-bar div.on-3 { background:#16a34a; }
  .strength-bar div.on-4 { background:#16a34a; }
  .strength-label { font-size:11px; font-weight:700; color:var(--text-soft); margin-top:4px; }

  .error-box {
    display:none; background:var(--danger-bg); border:1px solid var(--danger-border);
    border-radius:10px; padding:11px 14px; font-size:13px; font-weight:600;
    color:var(--danger); margin-bottom:16px;
    animation:shake .35s ease;
  }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-5px)} 40%,80%{transform:translateX(5px)} }

  .btn {
    width:100%; padding:14px; border:none; border-radius:12px; cursor:pointer;
    font-family:"Nunito",sans-serif; font-size:15px; font-weight:800;
    background:linear-gradient(135deg,var(--pink) 0%,var(--p700) 100%);
    color:white; box-shadow:0 6px 20px rgba(217,79,138,.35);
    transition:transform .15s, box-shadow .2s;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .btn:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(217,79,138,.45); }
  .btn:active { transform:scale(.98); }
  .btn:disabled { opacity:.6; cursor:not-allowed; transform:none; }
  .btn svg { width:18px; height:18px; stroke:white; fill:none; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }

  .footer-note { text-align:center; font-size:12px; color:var(--text-soft); font-weight:600; margin-top:20px; }
  .footer-note strong { color:var(--p700); }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="card-icon">🔑</div>
    <div class="eyebrow">Segurança</div>
    <h1>Crie sua senha</h1>
    <p class="sub">Olá, <strong>{{ usuario_nome }}</strong>! Por segurança, defina uma senha pessoal antes de continuar.</p>

    <div class="aviso">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Esta é a primeira vez que você acessa o sistema. A senha temporária enviada por e-mail deve ser substituída agora.
    </div>

    <div class="error-box" id="error-box"></div>

    <div class="field">
      <label>Senha atual (temporária)</label>
      <div class="input-wrap">
        <svg class="ico" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input id="pw-atual" type="password" placeholder="Senha recebida por e-mail">
        <button class="toggle-pw" type="button" onclick="toggle('pw-atual')">👁</button>
      </div>
    </div>

    <div class="field">
      <label>Nova senha</label>
      <div class="input-wrap">
        <svg class="ico" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input id="pw-nova" type="password" placeholder="Mínimo 6 caracteres" oninput="verificarForca()">
        <button class="toggle-pw" type="button" onclick="toggle('pw-nova')">👁</button>
      </div>
      <div class="strength-bar">
        <div id="s1"></div><div id="s2"></div><div id="s3"></div><div id="s4"></div>
      </div>
      <div class="strength-label" id="strength-label"></div>
    </div>

    <div class="field">
      <label>Confirmar nova senha</label>
      <div class="input-wrap">
        <svg class="ico" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input id="pw-confirm" type="password" placeholder="Repita a nova senha" onkeydown="if(event.key==='Enter')salvar()">
        <button class="toggle-pw" type="button" onclick="toggle('pw-confirm')">👁</button>
      </div>
    </div>

    <button class="btn" id="btn-salvar" onclick="salvar()">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      Definir senha e entrar
    </button>

    <p class="footer-note">PatrimônioTech · <strong>Fama Soluções</strong></p>
  </div>
</div>

<script>
function toggle(id){
  const i=document.getElementById(id);
  i.type=i.type==='password'?'text':'password';
}

function verificarForca(){
  const v=document.getElementById('pw-nova').value;
  const bars=[document.getElementById('s1'),document.getElementById('s2'),document.getElementById('s3'),document.getElementById('s4')];
  const label=document.getElementById('strength-label');
  let score=0;
  if(v.length>=6)score++;
  if(v.length>=10)score++;
  if(/[A-Z]/.test(v)&&/[0-9]/.test(v))score++;
  if(/[^A-Za-z0-9]/.test(v))score++;
  bars.forEach((b,i)=>{b.className=i<score?'on-'+score:'';});
  const labels=['','Fraca','Razoável','Boa','Forte'];
  label.textContent=v.length?labels[score]||'':'';
}

async function salvar(){
  const atual=document.getElementById('pw-atual').value.trim();
  const nova=document.getElementById('pw-nova').value;
  const conf=document.getElementById('pw-confirm').value;
  const err=document.getElementById('error-box');
  const btn=document.getElementById('btn-salvar');

  err.style.display='none';

  if(!atual){err.textContent='Informe a senha temporária recebida por e-mail.';err.style.display='block';return;}
  if(nova.length<6){err.textContent='A nova senha deve ter pelo menos 6 caracteres.';err.style.display='block';return;}
  if(nova!==conf){err.textContent='As senhas não coincidem.';err.style.display='block';return;}

  btn.disabled=true;
  btn.innerHTML='<svg viewBox="0 0 24 24" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56" stroke="white" fill="none" stroke-width="2.5" stroke-linecap="round"/></svg> Salvando...';

  try{
    const res=await fetch('/api/alterar_senha',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({senha_atual:atual, senha_nova:nova})
    });
    const data=await res.json();
    if(data.sucesso){
      window.location.href='/';
    } else {
      err.textContent=data.erro||'Erro ao alterar senha.';
      err.style.display='block';
      btn.disabled=false;
      btn.innerHTML='<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Definir senha e entrar';
    }
  }catch(e){
    err.textContent='Erro de conexão. Tente novamente.';
    err.style.display='block';
    btn.disabled=false;
    btn.innerHTML='<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Definir senha e entrar';
  }
}
</script>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</body>
</html>
